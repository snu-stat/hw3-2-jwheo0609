name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ master ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzmq3-dev pkg-config

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.13'
          activate-environment: r-reticulate
          channels: conda-forge

      - name: Install Python dependencies via Conda
        run: |
          conda config --set channel_priority flexible
          # ✨ jupyter 옆에 ipython과 ipykernel을 추가했습니다.
          conda install -n r-reticulate -c conda-forge --override-channels \
            jupyter ipython ipykernel pip numpy pandas scipy statsmodels polars plotnine
          conda run -n r-reticulate pip install pylahman
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("reticulate", "knitr", "rmarkdown", "dplyr", "Lahman", "tidyr", "ggplot2", "patchwork", "NHANES", "tidyverse", "car", "MASS"))
        # 추가로 필요한 패키지 설치
        shell: Rscript {0}
      
      - name: Prepare README as Index
        run: cp README.md index.md

      - name: Render Quarto
        run: |
          export RETICULATE_PYTHON=$(conda info --base)/envs/r-reticulate/bin/python
          # ✨ 추가된 부분: Quarto가 무조건 Conda 환경의 파이썬을 사용하도록 강제 고정
          export QUARTO_PYTHON=$(conda info --base)/envs/r-reticulate/bin/python
          quarto render

          # ✨ 추가된 부분: hw03.qmd 파일을 기반으로 hw03.ipynb를 루트 디렉토리에 강제 생성합니다.
          quarto render hw03.qmd --to ipynb
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }} # <--- 여기를 GITHUB_TOKEN에서 GHCR_PAT로 변경!

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 조직 이름 대신 현재 실행 중인 유저(나)의 이름으로 Push
          tags: ghcr.io/${{ github.actor }}/my-r-env:latest